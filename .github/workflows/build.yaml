        if: always()
        with:
          name: python-${{ needs.prepare.outputs.dist_version }}${{ steps.build-settings.outputs.artifact_suffix }}-docs.epub
          path: ./Doc/dist/python-${{ needs.prepare.outputs.dist_version }}*-docs.epub
          if-no-files-found: ignore
  build-pdf:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@master
        with:
          python-version: ${{ inputs.python_version }}
      - uses: actions/checkout@master
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.reference }}
      - name: Checkout translation sources
        if: ${{ inputs.language != 'en' }}
        uses: actions/checkout@master
        with:
          repository: ${{ needs.prepare.outputs.translation_repository }}
          ref: ${{ needs.prepare.outputs.translation_ref }}
          path: Doc/locale/${{ inputs.language }}/LC_MESSAGES
      - id: build-settings
        env:
          LANGUAGE_TAG: ${{ inputs.language }}
          SPHINXOPTS_JSON: ${{ inputs.sphinxopts_json }}
        run: |
          python - <<'PY'
          import json
          import os
          import shlex

          language = os.environ["LANGUAGE_TAG"]
          config_sphinxopts = [token for opt in json.loads(os.environ["SPHINXOPTS_JSON"]) for token in shlex.split(opt)]
          common = []
          if language != "en":
              try:
                  import re
                  with open("Doc/requirements.txt") as f:
                      m = re.search(r"(?i)^sphinx[=<>!~\s]*(\d+)\.(\d+)", f.read(), re.MULTILINE)
                  sphinx_ver = (int(m.group(1)), int(m.group(2))) if m else (99, 0)
              except FileNotFoundError:
