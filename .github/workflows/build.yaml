          artifact_suffix = "" if language == "en" else f"-{language}"
          pdf = [*common, *config_sphinxopts]

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as file:
              file.write(f"artifact_suffix={artifact_suffix}\n")
              file.write(f"common_sphinxopts={shlex.join(common)}\n")
              file.write(f"pdf_sphinxopts={shlex.join(pdf)}\n")
          PY
      - run: make venv
        working-directory: ./Doc
      - run: sudo apt-get update && sudo apt-get install -y latexmk texlive-xetex fonts-freefont-otf xindy librsvg2-bin
      - name: Install language-specific texlive packages
        env:
          LANGUAGE_TAG: ${{ inputs.language }}
        run: |
          case "$LANGUAGE_TAG" in
            pt-br) sudo apt-get install -y texlive-lang-portuguese ;;
            zh-tw|zh-cn) sudo apt-get install -y texlive-lang-chinese ;;
            ko) sudo apt-get install -y texlive-lang-korean ;;
            ja) sudo apt-get install -y texlive-lang-japanese ;;
          esac
      - run: make dist-pdf SPHINXERRORHANDLING= SPHINXOPTS="${{ steps.build-settings.outputs.pdf_sphinxopts }}"
        working-directory: ./Doc
      - name: Dump LaTeX log tails on failure
        if: failure()
        run: |
          set -euxo pipefail
          for f in Doc/build/latex/*.log; do
            echo "===== $f (tail) ====="
            tail -n 80 "$f" || true
          done
      - uses: actions/upload-artifact@master
        if: always()
        with:
          name: python-${{ needs.prepare.outputs.dist_version }}${{ steps.build-settings.outputs.artifact_suffix }}-pdf-logs.zip
          path: |
            ./Doc/build/latex/*.log
            ./Doc/build/latex/*.tex
      - uses: actions/upload-artifact@master
        if: always()
        with:
          name: python-${{ needs.prepare.outputs.dist_version }}${{ steps.build-settings.outputs.artifact_suffix }}-docs-pdf-a4.zip
          path: ./Doc/dist/python-${{ needs.prepare.outputs.dist_version }}*-docs-pdf-a4.zip
          if-no-files-found: ignore
      - uses: actions/upload-artifact@master
        if: always()
        with:
          name: python-${{ needs.prepare.outputs.dist_version }}${{ steps.build-settings.outputs.artifact_suffix }}-docs-pdf-a4.tar.bz2
          path: ./Doc/dist/python-${{ needs.prepare.outputs.dist_version }}*-docs-pdf-a4.tar.bz2
          if-no-files-found: ignore
  publish:
    needs: [prepare, build-html, build-text, build-texinfo, build-epub, build-pdf]
    if: ${{ !cancelled() && inputs.publish == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Checkout existing gh-pages content
        id: checkout-pages
        uses: actions/checkout@v5
        with:
          ref: gh-pages
          path: _site
        continue-on-error: true

      - name: Prepare site directory
        run: |
          mkdir -p _site/${{ inputs.language }}/${{ needs.prepare.outputs.major_minor }}
          # Remove git metadata; safe even if checkout above did not succeed
          rm -rf _site/.git

      - name: Download all artifacts
        # Collect all build artifacts then merge into the publish directory
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Copy new archives into site directory
        run: |
          # Copy generated archives (zip, tar.bz2, epub) into _site/<language>/<major_minor>/,
          # excluding PDF build logs which are for debugging only.
          find artifacts/ -type f \( -name "*.zip" -o -name "*.tar.bz2" -o -name "*.epub" \) \
            ! -name "python-*-pdf-logs.zip" \
            -exec cp {} _site/${{ inputs.language }}/${{ needs.prepare.outputs.major_minor }}/ \;

      - name: Generate per-version directory listing
        run: |
          python - <<'PY'
          import re
          from datetime import datetime, timezone
          from html import escape
          from pathlib import Path
          from urllib.parse import quote

          root = Path("_site")
          version_pattern = re.compile(r"^\d+\.\d+$")
          for lang_dir in sorted(p for p in root.iterdir() if p.is_dir()):
              for version_dir in sorted(
                  p for p in lang_dir.iterdir() if p.is_dir() and version_pattern.match(p.name)
              ):
                  files = sorted(
                      p for p in version_dir.iterdir() if p.is_file() and p.name != "index.html"
                  )
                  rows = []
                  for file_path in files:
                      stat = file_path.stat()
                      timestamp = datetime.fromtimestamp(stat.st_mtime, timezone.utc).strftime(
                          "%Y-%m-%d %H:%M:%S UTC"
                      )
                      rows.append(
                          f'<tr><td><a href="{quote(file_path.name)}">{escape(file_path.name)}</a></td><td>{timestamp}</td><td>{stat.st_size}</td></tr>'
                      )

                  relative_path = f"/{version_dir.relative_to(root).as_posix()}/"
                  html = [
                      "<!doctype html>",
                      '<html lang="en">',
                      '<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Directory listing</title></head>',
                      "<body>",
                      f"<h1>Path: {escape(relative_path)}</h1>",
                      "<table>",
                      '<thead><tr><th scope="col">Filename</th><th scope="col">Timestamp (UTC)</th><th scope="col">Size (bytes)</th></tr></thead>',
                      "<tbody>",
                      *rows,
                      "</tbody>",
                      "</table>",
                      "</body>",
                      "</html>",
                  ]
                  (version_dir / "index.html").write_text("\n".join(html) + "\n", encoding="utf-8")
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
