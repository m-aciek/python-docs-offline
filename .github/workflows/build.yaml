run-name: build ${{ inputs.repository }}:${{ inputs.reference }}
on:
  workflow_dispatch:
    inputs:
      reference:
        description: 'Commit reference from CPython repository'
        required: true
        default: '3.14'
      repository:
        description: 'Repository to checkout'
        required: false
        default: 'python/cpython'
      publish:
        description: 'Publish to GitHub Pages'
        required: false
        default: false
      python_version:
        description: 'Python version used to generate docs'
        required: false
        default: '3'
      language:
        description: 'Language to build'
        required: false
        default: 'en'
      sphinxopts_json:
        description: 'JSON array of language-specific sphinxopts'
        required: false
        default: '[]'
  workflow_call:
    inputs:
      reference:
        description: 'Commit reference from CPython repository'
        default: '3.14'
        type: string
      repository:
        description: 'Repository to checkout'
        default: 'python/cpython'
        type: string
      publish:
        description: 'Publish to GitHub Pages'
        default: 'false'
        type: string
      python_version:
        description: 'Python version used to generate docs'
        default: '3'
        type: string
      language:
        description: 'Language to build'
        default: 'en'
        type: string
      sphinxopts_json:
        description: 'JSON array of language-specific sphinxopts'
        default: '[]'
        type: string
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      dist_version: ${{ steps.get-version.outputs.dist_version }}
      major_minor: ${{ steps.get-version.outputs.major_minor }}
      translation_ref: ${{ steps.resolve-translation.outputs.translation_ref }}
      translation_repository: ${{ steps.resolve-translation.outputs.translation_repository }}
    steps:
      - uses: actions/setup-python@master
        with:
          python-version: ${{ inputs.python_version }}
      - uses: actions/checkout@master
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.reference }}
      - id: get-version
        run: |
          echo "dist_version=$(python tools/extensions/patchlevel.py --short)" >> "$GITHUB_OUTPUT"
          echo "major_minor=$(python -c 'from tools.extensions.patchlevel import get_version_info; print(get_version_info()[0])')" >> "$GITHUB_OUTPUT"
        working-directory: ./Doc
      - name: Resolve translation branch
        id: resolve-translation
        if: ${{ inputs.language != 'en' }}
        env:
          LANGUAGE_TAG: ${{ inputs.language }}
          MAJOR_MINOR: ${{ steps.get-version.outputs.major_minor }}
        run: |
          python - <<'PY'
          import bisect
          import os
          import re
          import subprocess

          language = os.environ["LANGUAGE_TAG"]
          target_version = os.environ["MAJOR_MINOR"]
          repo_tag = language.replace("_", "-").lower()
          repo_url = f"https://github.com/python/python-docs-{repo_tag}.git"

          remote_branches = subprocess.check_output(
              ["git", "ls-remote", "--heads", repo_url], text=True
          )
          branches = sorted(
              {
                  match.group(1)
                  for match in re.finditer(r"refs/heads/([0-9]+\.[0-9]+)$", remote_branches, re.M)
              },
              key=lambda value: tuple(map(int, value.split("."))),
          )
          if not branches:
              raise SystemExit(f"No numeric translation branches found for {repo_url}")
          branch_tuples = [tuple(map(int, value.split("."))) for value in branches]
          target_tuple = tuple(map(int, target_version.split(".")))
          index = bisect.bisect_left(branch_tuples, target_tuple)
          chosen = branches[index] if index < len(branches) else branches[-1]

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as file:
              file.write(f"translation_ref={chosen}\n")
              file.write(f"translation_repository=python/python-docs-{repo_tag}\n")
          PY
  build-html:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@master
        with:
          python-version: ${{ inputs.python_version }}
      - uses: actions/checkout@master
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.reference }}
      - name: Checkout translation sources
        if: ${{ inputs.language != 'en' }}
        uses: actions/checkout@master
        with:
          repository: ${{ needs.prepare.outputs.translation_repository }}
          ref: ${{ needs.prepare.outputs.translation_ref }}
          path: Doc/locale/${{ inputs.language }}/LC_MESSAGES
      - id: build-settings
        env:
          LANGUAGE_TAG: ${{ inputs.language }}
          SPHINXOPTS_JSON: ${{ inputs.sphinxopts_json }}
        run: |
          python - <<'PY'
          import json
          import os
          import shlex

          language = os.environ["LANGUAGE_TAG"]
          config_sphinxopts = [token for opt in json.loads(os.environ["SPHINXOPTS_JSON"]) for token in shlex.split(opt)]
          common = []
          if language != "en":
              try:
                  import re
                  with open("Doc/requirements.txt") as f:
                      m = re.search(r"(?i)^sphinx[=<>!~\s]*(\d+)\.(\d+)", f.read(), re.MULTILINE)
                  sphinx_ver = (int(m.group(1)), int(m.group(2))) if m else (99, 0)
              except FileNotFoundError:
                  sphinx_ver = (99, 0)
              common = [
                  "-D", "locale_dirs=locale",
                  "-D", f"language={language}",
                  "-D", "gettext_compact=0",
                  "-D", "exclude_patterns=includes/*.rst,venv/*,README.rst,locale/**",
              ]
              if sphinx_ver >= (7, 1):
                  common += ["-D", "translation_progress_classes=1"]
          artifact_suffix = "" if language == "en" else f"-{language}"
          pdf = [*common, *config_sphinxopts]

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as file:
              file.write(f"artifact_suffix={artifact_suffix}\n")
              file.write(f"common_sphinxopts={shlex.join(common)}\n")
              file.write(f"pdf_sphinxopts={shlex.join(pdf)}\n")
          PY
      - run: make venv
        working-directory: ./Doc
      - run: make dist-html SPHINXERRORHANDLING= SPHINXOPTS="${{ steps.build-settings.outputs.common_sphinxopts }}"
        working-directory: ./Doc
      - uses: actions/upload-artifact@master
        if: always()
        with:
          name: python-${{ needs.prepare.outputs.dist_version }}${{ steps.build-settings.outputs.artifact_suffix }}-docs-html.zip
          path: ./Doc/dist/python-${{ needs.prepare.outputs.dist_version }}*-docs-html.zip
          if-no-files-found: ignore
      - uses: actions/upload-artifact@master
        if: always()
        with:
          name: python-${{ needs.prepare.outputs.dist_version }}${{ steps.build-settings.outputs.artifact_suffix }}-docs-html.tar.bz2
          path: ./Doc/dist/python-${{ needs.prepare.outputs.dist_version }}*-docs-html.tar.bz2
          if-no-files-found: ignore
